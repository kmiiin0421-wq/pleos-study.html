<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현대차그룹 PLEOS 스터디 · 퀴즈 · 마인드맵</title>
<style>
  :root{
    --bg:#0a0e1a; --bg2:#121829; --card:#161d31; --card2:#1c2541;
    --line:#2a3552; --txt:#e8edf7; --sub:#9aa7c4; --accent:#00b4e6;
    --c-overview:#4FC3F7; --c-os:#9b7af0; --c-connect:#26C6A6;
    --c-ai:#FF8A5C; --c-eco:#FFCA45; --c-biz:#F06292;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI","Malgun Gothic",sans-serif;background:linear-gradient(160deg,#0a0e1a,#0d1424);color:var(--txt);min-height:100vh}
  header{padding:24px 24px 16px;text-align:center;border-bottom:1px solid var(--line);background:rgba(0,0,0,.2)}
  header h1{font-size:25px;letter-spacing:.5px}
  header h1 b{color:var(--accent)}
  header p{color:var(--sub);margin-top:6px;font-size:14px}
  .tabs{display:flex;justify-content:center;gap:8px;margin:16px auto 0;flex-wrap:wrap}
  .tab{padding:10px 22px;border:1px solid var(--line);background:var(--card);color:var(--sub);
    border-radius:999px;cursor:pointer;font-size:15px;transition:.18s;font-weight:600}
  .tab:hover{color:var(--txt);border-color:var(--accent)}
  .tab.active{background:var(--accent);color:#04141d;border-color:var(--accent)}
  main{max-width:1280px;margin:0 auto;padding:22px 18px 56px}
  .view{display:none;animation:fade .3s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- STUDY (guided path) ---------- */
  .pathintro{text-align:center;color:var(--sub);font-size:14px;margin-bottom:16px}
  .searchwrap{max-width:520px;margin:0 auto 22px}
  #search{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);font-size:14px}
  #search::placeholder{color:var(--sub)}
  .pathbar{display:flex;justify-content:center;gap:0;margin:0 auto 24px;flex-wrap:wrap;max-width:920px}
  .pdot{display:flex;align-items:center;gap:0;cursor:pointer}
  .pdot .num{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);display:flex;
    align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--card);
    color:var(--sub);transition:.2s;flex-shrink:0}
  .pdot.active .num{background:var(--accent);border-color:var(--accent);color:#04141d}
  .pdot.done .num{border-color:var(--accent);color:var(--accent)}
  .pdot .lbl{font-size:12px;color:var(--sub);margin:0 6px 0 6px;white-space:nowrap}
  .pdot.active .lbl{color:var(--txt);font-weight:700}
  .pline{width:26px;height:2px;background:var(--line);flex-shrink:0}

  .steps{max-width:900px;margin:0 auto}
  .step{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:.2s}
  .step.active{border-color:var(--accent);box-shadow:0 6px 26px rgba(0,180,230,.12)}
  .step-head{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer}
  .step-head .badge{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:19px;flex-shrink:0;background:var(--card2)}
  .step-head .htext h3{font-size:17px}
  .step-head .htext p{font-size:13px;color:var(--sub);margin-top:3px}
  .step-head .chev{margin-left:auto;color:var(--sub);font-size:13px;transition:.2s}
  .step.active .step-head .chev{transform:rotate(180deg);color:var(--accent)}
  .step-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .step-inner{padding:4px 20px 20px}
  .step-lead{background:var(--card2);border-radius:10px;padding:13px 15px;font-size:14px;line-height:1.6;color:#cdd6ee;margin-bottom:14px;border-left:3px solid var(--accent)}

  .krow{border:1px solid var(--line);border-left-width:4px;border-radius:10px;margin-bottom:9px;background:var(--bg2);transition:.15s}
  .krow:hover{border-color:var(--accent)}
  .krow-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
  .krow-head .kt{font-size:15.5px;font-weight:700}
  .krow-head .ken{font-size:12px;color:var(--sub)}
  .krow-head .tog{margin-left:auto;color:var(--accent);font-size:13px;font-weight:700}
  .krow .kshort{padding:0 14px 12px 14px;font-size:13.5px;color:#c6cfe6;line-height:1.55;margin-top:-4px}
  .krow .kdetail{max-height:0;overflow:hidden;transition:.3s;font-size:13px;color:#aeb9d6;line-height:1.65}
  .krow.open .kdetail{max-height:360px;padding:0 14px 12px}
  .subchips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 12px}
  .subchip{font-size:11.5px;padding:4px 10px;border-radius:999px;font-weight:600}
  .nextbtn{margin-top:6px}
  .btn{padding:11px 24px;border:none;border-radius:10px;background:var(--accent);color:#04141d;
    font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}

  /* ---------- QUIZ ---------- */
  .quizbox{max-width:720px;margin:0 auto}
  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modegrid .qstart{transition:.18s;padding:26px 22px}
  .modegrid .qstart:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.4)}
  @media(max-width:620px){.modegrid{grid-template-columns:1fr}}
  .qstart{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:40px 24px}
  .qstart h2{font-size:22px;margin-bottom:10px}
  .qstart p{color:var(--sub);margin-bottom:22px}
  .progress{height:8px;background:var(--card);border-radius:999px;overflow:hidden;margin-bottom:18px}
  .progress>div{height:100%;background:var(--accent);width:0;transition:.3s}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px}
  .qmeta{color:var(--sub);font-size:13px;margin-bottom:8px}
  .qtext{font-size:19px;line-height:1.5;margin-bottom:20px;font-weight:600}
  .opt{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;border-radius:10px;
    border:1px solid var(--line);background:var(--card2);color:var(--txt);cursor:pointer;font-size:15px;transition:.15s}
  .opt:hover:not(:disabled){border-color:var(--accent)}
  .opt.correct{background:rgba(38,198,166,.18);border-color:#26C6A6}
  .opt.wrong{background:rgba(240,98,146,.16);border-color:#F06292}
  .opt:disabled{cursor:default}
  .explain{margin-top:6px;padding:14px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);
    font-size:14px;line-height:1.6;color:#c6cfe6;display:none}
  .explain.show{display:block}
  .qnav{display:flex;justify-content:space-between;margin-top:18px;align-items:center}
  .result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:40px 24px}
  .result .score{font-size:52px;font-weight:800;color:var(--accent)}
  .result .msg{font-size:18px;margin:10px 0 24px}

  /* ---------- MINDMAP ---------- */
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:2px 0 12px;font-size:12.5px;color:var(--sub)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .mapwrap{position:relative}
  .mapcanvas{width:100%;height:74vh;min-height:460px;
    background:radial-gradient(circle at 50% 46%,#15233f,#0a0e1a 72%);
    border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .mapcanvas svg{width:100%;height:100%;display:block}
  .detailpanel{position:absolute;top:14px;right:14px;width:268px;max-height:calc(74vh - 28px);overflow:auto;
    background:rgba(18,24,41,.94);backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .detailpanel .cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .detailpanel h3{font-size:19px;margin:6px 0}
  .detailpanel .en{font-size:12px;color:var(--sub);margin-bottom:10px}
  .detailpanel .d{font-size:13.5px;line-height:1.65;color:#c6cfe6}
  .detailpanel .hint{color:var(--sub);font-size:13px;line-height:1.6}
  .detailpanel .pchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .node{cursor:pointer}
  .node text{font-family:"Segoe UI","Malgun Gothic",sans-serif;font-weight:700;pointer-events:none}
  .node rect{transition:.15s}
  .node:hover rect{filter:brightness(1.22)}
  .edge{fill:none;stroke-opacity:.5}
  @media(max-width:780px){
    .detailpanel{position:static;width:100%;max-height:none;margin-top:12px}
    .mapcanvas{height:60vh}
    .pdot .lbl{display:none}
  }
</style>
</head>
<body>
<header>
  <h1><b>PLEOS</b> 스터디 보드 · 현대자동차그룹 SDV 소프트웨어</h1>
  <p>단계별로 익히고 → 퀴즈로 점검하고 → 마인드맵으로 한눈에</p>
  <div class="tabs">
    <button class="tab active" data-view="study">📚 학습</button>
    <button class="tab" data-view="quiz">📝 퀴즈</button>
    <button class="tab" data-view="map">🧠 마인드맵</button>
  </div>
</header>

<main>
  <!-- STUDY -->
  <section class="view active" id="study">
    <p class="pathintro">큰 개념에서 시작해 한 단계씩 좁혀 들어가는 학습 경로입니다. 단계를 눌러 펼치고, 키워드를 눌러 자세히 보세요.</p>
    <div class="searchwrap"><input id="search" type="text" placeholder="🔍 키워드 바로 찾기 (예: Gleo, OTA, 존 컨트롤러)"></div>
    <div class="pathbar" id="pathbar"></div>
    <div class="steps" id="steps"></div>
    <div class="steps" id="searchResults" style="display:none"></div>
  </section>

  <!-- QUIZ -->
  <section class="view" id="quiz">
    <div class="quizbox" id="quizbox"></div>
  </section>

  <!-- MAP -->
  <section class="view" id="map">
    <div class="legend" id="legend"></div>
    <div class="mapwrap">
      <div class="mapcanvas"><svg id="svg" viewBox="0 0 1600 1180" preserveAspectRatio="xMidYMid meet"></svg></div>
      <div class="detailpanel" id="panel">
        <div class="hint">노드를 클릭하면 설명이 여기 표시됩니다.<br><br>중심 <b>PLEOS</b> → 6개 영역 → 키워드 → 세부 태그로 가지가 뻗어 있어요. 전체가 한 화면에 들어옵니다.</div>
      </div>
    </div>
  </section>
</main>

<script>
/* ============== DATA ============== */
const CATS = [
  {id:"overview", name:"개요·브랜드",   hex:"#4FC3F7"},
  {id:"os",       name:"OS·아키텍처",   hex:"#9b7af0"},
  {id:"connect",  name:"Pleos Connect", hex:"#26C6A6"},
  {id:"ai",       name:"AI·인터페이스", hex:"#FF8A5C"},
  {id:"eco",      name:"개발자 생태계", hex:"#FFCA45"},
  {id:"biz",      name:"적용·비전",     hex:"#F06292"},
];
const catHex = id => (CATS.find(c=>c.id===id)||{}).hex;
const catName = id => (CATS.find(c=>c.id===id)||{}).name;

const KW = [
  {t:"PLEOS (플레오스)", en:"Pleo(라틴어 '더 많은') + OS", cat:"overview",
   s:"현대차그룹의 통합 모빌리티 소프트웨어 브랜드이자 기술 플랫폼.",
   d:"라틴어 'Pleo'(더 많은)와 운영체제(OS)를 결합한 이름. SDV 비전의 핵심으로 '바퀴 달린 스마트폰' 시대를 상징한다. Vehicle OS·Connect·Playground·App Market·Cloud를 아우르는 우산 브랜드.",
   subs:["우산 브랜드","'Pleo'+OS","바퀴 달린 스마트폰"]},
  {t:"Pleos 25", en:"Developer Conference 2025", cat:"overview",
   s:"2025년 개최된 현대차그룹 개발자 컨퍼런스.",
   d:"그룹의 소프트웨어 비전과 Pleos Vehicle OS·Pleos Connect를 처음 공개한 자리. 제조사·공급업체만 접근하던 차량 SW 개발 환경을 외부 개발자에게 개방한다는 방향을 선언했다.",
   subs:["2025 컨퍼런스","비전 공개","개발 환경 개방"]},
  {t:"SDV", en:"Software-Defined Vehicle", cat:"overview",
   s:"소프트웨어로 정의되는 차량. PLEOS가 지향하는 패러다임.",
   d:"하드웨어보다 소프트웨어가 차량의 기능과 경험을 주도하는 차량. 출고 이후에도 OTA로 기능이 계속 진화한다. Pleos Connect는 현대차그룹의 첫 SDV 결과물이다.",
   subs:["SW 주도","OTA 진화","경험 중심"]},

  {t:"Pleos Vehicle OS", en:"차량용 운영체제", cat:"os",
   s:"차량을 소프트웨어 중심으로 운영하기 위한 차량용 OS.",
   d:"E&E 아키텍처를 기반으로 차량이 지속적으로 연결·업데이트되도록 지원한다. 하드웨어와 소프트웨어를 분리(디커플링)한 구조가 핵심으로, 인포테인먼트용 Pleos Connect와 구분되는 '차량 제어' 계층의 OS다.",
   subs:["차량 제어 계층","E&E 기반","지속 업데이트"]},
  {t:"E&E 아키텍처", en:"Electrical & Electronic Architecture", cat:"os",
   s:"차량 내 전자·전기 시스템 구성 구조.",
   d:"Pleos Vehicle OS의 토대. 분산된 다수의 제어기 대신 중앙집중형 컴퓨팅으로 전환하여 소프트웨어 업데이트와 기능 통합을 쉽게 만든다.",
   subs:["중앙집중형","전자·전기 구조"]},
  {t:"HPVC", en:"High Performance Vehicle Computer", cat:"os",
   s:"고성능 차량 컴퓨터.",
   d:"여러 기능을 통합 처리하는 고성능 중앙 컴퓨터. 흩어져 있던 다수의 제어기(ECU)를 대체하며, 존 컨트롤러와 함께 차량 전자 구조의 두 축을 이룬다.",
   subs:["중앙 컴퓨터","ECU 통합","고성능"]},
  {t:"Zone Controller", en:"존 컨트롤러", cat:"os",
   s:"차량을 구역(zone)별로 나눠 제어하는 컨트롤러.",
   d:"차량을 위치 기반 구역으로 나눠 배선·제어를 단순화한다. HPVC와 함께 적용해 기존 제어기 수를 약 66% 감축한다.",
   subs:["구역 제어","배선 단순화"]},
  {t:"HW/SW 디커플링", en:"하드웨어-소프트웨어 분리", cat:"os",
   s:"하드웨어와 소프트웨어를 분리하는 설계 원칙.",
   d:"하드웨어 교체 없이 소프트웨어 업데이트만으로 신기능을 추가·개선할 수 있게 한다. SDV를 가능하게 하는 근본 설계 사상.",
   subs:["HW 교체 불필요","SW 업데이트"]},
  {t:"제어기 66% 감축", en:"66% ECU Reduction", cat:"os",
   s:"하드웨어 통합 효과.",
   d:"HPVC와 존 컨트롤러로 전자 구조를 통합해 기존 제어기 수를 약 66% 줄인다. 원가·복잡도 절감과 SW 업데이트 용이성을 확보한다.",
   subs:["HW 통합","원가 절감"]},

  {t:"Pleos Connect", en:"차세대 인포테인먼트 시스템", cat:"connect",
   s:"AAOS 기반 차세대 인포테인먼트 시스템. 그룹 첫 SDV 결과물.",
   d:"직관성·안전성·개방성 3대 지향점을 갖는다. 2026년 4월 양산형이 공개됐고, 익숙한 모바일 앱·콘텐츠를 차량에서 자연스럽게 쓰도록 설계됐다. Gleo AI·App Market·OTA가 결합된다.",
   subs:["직관성","안전성","개방성"]},
  {t:"AAOS", en:"Android Automotive OS", cat:"connect",
   s:"Pleos Connect의 기반 OS.",
   d:"구글의 차량용 안드로이드. 모바일 친화적 환경을 제공해 검증된 앱 생태계와 익숙한 UX를 차량으로 가져온다.",
   subs:["안드로이드","앱 생태계","모바일 친화"]},
  {t:"디스플레이 구성", en:"Central + Slim Display", cat:"connect",
   s:"대형 중앙 스크린 + 슬림 디스플레이.",
   d:"대형 중앙 스크린은 주행정보 화면·앱 화면·하단 바(빠른 실행)로 구성된다. 운전자 정면 슬림 디스플레이는 속도·미디어·턴바이턴 길안내를 보여준다. 데이터 기반으로 레이아웃을 재구성한다.",
   subs:["대형 중앙 스크린","슬림 디스플레이","하단 바"]},
  {t:"3핑거 제스처", en:"Touch-free Gesture", cat:"connect",
   s:"세 손가락 동작으로 조작하는 터치프리 인터페이스.",
   d:"화면을 직접 만지지 않고 세 손가락 제스처로 제어한다. 스티어링 휠 물리 버튼과 함께 운전 중 안전성과 편의성을 높인다.",
   subs:["터치프리","스티어링 버튼"]},
  {t:"OTA", en:"Over-the-Air Update", cat:"connect",
   s:"무선 소프트웨어 업데이트.",
   d:"출고 이후에도 무선으로 소프트웨어를 갱신해 기능을 지속적으로 추가·개선한다. SDV의 핵심 가치를 구현하는 수단.",

let currentStep = 0;
const visited = new Set([0]);

function kwRowHTML(k){
  const color=catHex(k.cat);
  const chips=k.subs.map(s=>`<span class="subchip" style="background:${color}22;color:${color};border:1px solid ${color}66">${s}</span>`).join("");
  return `<div class="krow" style="border-left-color:${color}">
    <div class="krow-head">
      <span class="kt">${k.t}</span><span class="ken">${k.en}</span>
      <span class="tog">＋ 자세히</span>
    </div>
    <div class="kshort">${k.s}</div>
    <div class="kdetail"><p style="padding-top:4px">${k.d}</p></div>
    <div class="subchips">${chips}</div>
  </div>`;
}
function bindRows(scope){
  scope.querySelectorAll(".krow").forEach(row=>{
    row.querySelector(".krow-head").onclick=()=>{
      row.classList.toggle("open");
      row.querySelector(".tog").textContent=row.classList.contains("open")?"− 접기":"＋ 자세히";
    };
  });
}
function renderPathbar(){
  const pb=document.getElementById("pathbar"); pb.innerHTML="";
  STEPS.forEach((s,i)=>{
    if(i>0){const ln=document.createElement("div");ln.className="pline";pb.appendChild(ln);}
    const d=document.createElement("div");
    d.className="pdot"+(i===currentStep?" active":"")+(visited.has(i)&&i!==currentStep?" done":"");
    d.innerHTML=`<div class="num">${visited.has(i)&&i!==currentStep?"✓":(i+1)}</div><div class="lbl">${s.title.split(". ")[1].split(" —")[0].split(" (")[0]}</div>`;
    d.onclick=()=>openStep(i);
    pb.appendChild(d);
  });
}
function renderSteps(){
  const cont=document.getElementById("steps"); cont.innerHTML="";
  STEPS.forEach((s,i)=>{
    const rows=s.terms.map(t=>kwRowHTML(kwByTerm(t))).join("");
    const nextBtn = i<STEPS.length-1
      ? `<button class="btn nextbtn" data-next="${i+1}">다음 단계 →</button>`
      : `<button class="btn ghost nextbtn" data-goquiz="1">학습 완료! 퀴즈 풀기 →</button>`;
    const el=document.createElement("div");
    el.className="step"+(i===currentStep?" active":"");
    el.innerHTML=`
      <div class="step-head" data-step="${i}">
        <div class="badge">${s.icon}</div>
        <div class="htext"><h3>${s.title}</h3><p>${s.terms.length}개 키워드</p></div>
        <div class="chev">▼</div>
      </div>
      <div class="step-body"><div class="step-inner">
        <div class="step-lead">${s.lead}</div>
        ${rows}
        <div style="margin-top:12px">${nextBtn}</div>
      </div></div>`;
    cont.appendChild(el);
  });
  // bind
  cont.querySelectorAll(".step-head").forEach(h=>h.onclick=()=>openStep(+h.dataset.step));
  cont.querySelectorAll("[data-next]").forEach(b=>b.onclick=()=>openStep(+b.dataset.next,true));
  cont.querySelectorAll("[data-goquiz]").forEach(b=>b.onclick=()=>document.querySelector('[data-view=quiz]').click());
  bindRows(cont);
  syncBodies();
}
function syncBodies(){
  document.querySelectorAll("#steps .step").forEach((st,i)=>{
    const body=st.querySelector(".step-body");
    if(i===currentStep){st.classList.add("active");body.style.maxHeight=body.querySelector(".step-inner").scrollHeight+40+"px";}
    else{st.classList.remove("active");body.style.maxHeight="0";}
  });
}
function openStep(i,scroll){
  currentStep = (currentStep===i && !scroll) ? -1 : i;  // clicking active header collapses
  if(currentStep>=0) visited.add(currentStep);
  renderPathbar(); syncBodies();
  if(scroll && currentStep>=0){
    const st=document.querySelectorAll("#steps .step")[currentStep];
    st.scrollIntoView({behavior:"smooth",block:"center"});
  }
}
// search
document.getElementById("search").oninput=e=>{
  const q=e.target.value.trim().toLowerCase();
  const stepsEl=document.getElementById("steps");
  const pb=document.getElementById("pathbar");
  const res=document.getElementById("searchResults");
  if(!q){stepsEl.style.display="";pb.style.display="";res.style.display="none";return;}
  stepsEl.style.display="none";pb.style.display="none";res.style.display="";
  const hits=KW.filter(k=>(k.t+k.en+k.s+k.d+k.subs.join("")).toLowerCase().includes(q));
  res.innerHTML=`<div class="step active"><div class="step-head"><div class="badge">🔍</div>
    <div class="htext"><h3>검색 결과</h3><p>${hits.length}개</p></div></div>
    <div class="step-body" style="max-height:none"><div class="step-inner">
    ${hits.map(k=>kwRowHTML(k)).join("")||'<div class="step-lead">일치하는 키워드가 없습니다.</div>'}
    </div></div></div>`;
  bindRows(res);
};

const QUIZZES={
  concept:{icon:"🧠", title:"개념 학습 퀴즈",
    desc:"키워드의 정의와 사실을 정확히 익혔는지 점검합니다.",
    color:"var(--c-overview)", qs:CONCEPT_Q},
  planning:{icon:"🎯", title:"콘텐츠 기획 퀴즈",
    desc:"개념을 서로 연결해 프로세스·카테고리·서비스 방향을 사고합니다.",
    color:"var(--c-eco)", qs:PLANNING_Q},
};

let qi=0, score=0, answered=false, order=[], QSET=[], QMETA=null;
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}
function quizHome(){
  const cards=Object.entries(QUIZZES).map(([key,z])=>
    `<div class="qstart" style="text-align:left;border-color:${z.color};cursor:pointer" onclick="quizStart('${key}')">
       <div style="font-size:34px">${z.icon}</div>
       <h2 style="margin-top:6px">${z.title}</h2>
       <p style="margin:8px 0 16px">${z.desc}<br><span style="color:var(--sub)">${z.qs.length}문항 · 4지선다 · 즉시 해설</span></p>
       <button class="btn" style="background:${z.color}" onclick="event.stopPropagation();quizStart('${key}')">시작하기 →</button>
     </div>`).join("");
  document.getElementById("quizbox").innerHTML=
    `<h2 style="text-align:center;margin-bottom:6px">📝 어떤 퀴즈를 풀까요?</h2>
     <p style="text-align:center;color:var(--sub);margin-bottom:20px">목적에 맞는 모드를 고르세요.</p>
     <div class="modegrid">${cards}</div>`;
}
function quizStart(key){
  QMETA=QUIZZES[key]; QSET=QMETA.qs;
  qi=0;score=0;answered=false;order=shuffle([...QSET.keys()]);renderQ();
}
function renderQ(){
  answered=false;
  const Q=QSET[order[qi]];
  const pct=(qi/QSET.length)*100;
  let opts=Q.o.map((o,i)=>`<button class="opt" data-i="${i}" onclick="answer(${i})">${o}</button>`).join("");
  document.getElementById("quizbox").innerHTML=
   `<div class="progress"><div style="width:${pct}%;background:${QMETA.color}"></div></div>
    <div class="qcard">
      <div class="qmeta">${QMETA.icon} ${QMETA.title} · 문제 ${qi+1} / ${QSET.length} · 점수 ${score}</div>
      <div class="qtext">${Q.q}</div>${opts}
      <div class="explain" id="explain"></div>
      <div class="qnav">
        <button class="btn ghost" onclick="quizHome()">← 퀴즈 선택</button>
        <button class="btn" id="nextBtn" style="display:none" onclick="nextQ()">다음 →</button></div>
    </div>`;
}
function answer(i){
  if(answered)return; answered=true;
  const Q=QSET[order[qi]];
  document.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true; const bi=+b.dataset.i;
    if(bi===Q.a)b.classList.add("correct");
    if(bi===i&&i!==Q.a)b.classList.add("wrong");
  });
  if(i===Q.a)score++;
  const ex=document.getElementById("explain");
  ex.innerHTML=(i===Q.a?"✅ 정답! ":"❌ 오답. ")+Q.e; ex.classList.add("show");
  document.getElementById("nextBtn").style.display="block";
}
function nextQ(){qi++; if(qi>=QSET.length){quizResult();return;} renderQ();}
function quizResult(){
  const pct=Math.round(score/QSET.length*100);
  const planning=QMETA===QUIZZES.planning;
  let msg=pct===100?(planning?"🏆 기획 감각 완벽! 개념을 자유자재로 연결했어요.":"🏆 완벽합니다! PLEOS 마스터!"):
          pct>=70?"👏 훌륭해요! 거의 다 이해했어요.":
          pct>=40?"📖 좋아요. 학습 탭에서 한 번 더 복습해볼까요?":"💪 학습 탭으로 돌아가 키워드를 다시 살펴보세요!";
  const key=planning?"planning":"concept";
  document.getElementById("quizbox").innerHTML=
   `<div class="result"><div class="score" style="color:${QMETA.color}">${score}/${QSET.length}</div>
      <div class="msg">${QMETA.icon} ${QMETA.title} · ${msg} (정답률 ${pct}%)</div>
      <button class="btn" style="background:${QMETA.color}" onclick="quizStart('${key}')">다시 풀기</button>
      <button class="btn ghost" onclick="quizHome()">다른 퀴즈 선택</button>
      <button class="btn ghost" onclick="document.querySelector('[data-view=study]').click()">학습으로</button>
    </div>`;
}
quizHome();

/* ============== MINDMAP (3-level radial, fits in view) ============== */
let mapDrawn=false;
function renderMap(){
  const lg=document.getElementById("legend");
  if(!lg.childElementCount) lg.innerHTML=CATS.map(c=>`<span><i style="background:${c.hex}"></i>${c.name}</span>`).join("");
  if(mapDrawn) return; mapDrawn=true;

  const svg=document.getElementById("svg");
  const NS="http://www.w3.org/2000/svg";
  const CX=800, CY=590, R1=215, R2=400, R3=545;
  const edges=[], nodes=[];

  nodes.push({x:CX,y:CY,label:"PLEOS",hex:"#00b4e6",type:"center",
    data:{t:"PLEOS",en:"현대차그룹 통합 소프트웨어 브랜드",cat:null,
      d:"라틴어 'Pleo(더 많은)' + OS. 차량을 '바퀴 달린 스마트폰'으로 만드는 현대차그룹의 SDV 소프트웨어 우산 브랜드. 6개 영역으로 구성됩니다.",subs:[]}});

  CATS.forEach((c,i)=>{
    const cAng=-90 + i*60;
    const ar=cAng*Math.PI/180;
    const cxp=CX+R1*Math.cos(ar), cyp=CY+R1*Math.sin(ar);
    edges.push({x1:CX,y1:CY,x2:cxp,y2:cyp,hex:c.hex,w:3.5});
    nodes.push({x:cxp,y:cyp,label:c.name,hex:c.hex,type:"cat",
      data:{t:c.name,en:"영역",cat:c.id,d:catDesc(c.id),subs:[]}});

    const leaves=KW.filter(k=>k.cat===c.id);
    const cap=3;
    const weights=leaves.map(k=>Math.max(Math.min(k.subs.length,cap),1));
    const totalW=weights.reduce((a,b)=>a+b,0);
    const sectorW=54;                       // degrees
    let cursor=cAng - sectorW/2;
    leaves.forEach((k,idx)=>{
      const w=weights[idx], sliceW=sectorW*w/totalW;
      const leafAng=cursor+sliceW/2;
      const lr=leafAng*Math.PI/180;
      const lx=CX+R2*Math.cos(lr), ly=CY+R2*Math.sin(lr);
      edges.push({x1:cxp,y1:cyp,x2:lx,y2:ly,hex:c.hex,w:2});
      nodes.push({x:lx,y:ly,label:shortLabel(k.t),hex:c.hex,type:"leaf",data:k});

      const subs=k.subs.slice(0,cap);
      const pad=sliceW*0.14, a0=cursor+pad, a1=cursor+sliceW-pad;
      subs.forEach((s,si)=>{
        const sa=(subs.length===1)?(a0+a1)/2 : a0+(a1-a0)*si/(subs.length-1);
        const sr=sa*Math.PI/180;
        const sx=CX+R3*Math.cos(sr), sy=CY+R3*Math.sin(sr);
        edges.push({x1:lx,y1:ly,x2:sx,y2:sy,hex:c.hex,w:1});
        nodes.push({x:sx,y:sy,label:s,hex:c.hex,type:"sub",data:k});
      });
      cursor+=sliceW;
    });
  });

  // glow filter for center
  const defs=document.createElementNS(NS,"defs");
  defs.innerHTML=`<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg.appendChild(defs);

  edges.forEach(e=>{
    const p=document.createElementNS(NS,"path");
    const mx=(e.x1+e.x2)/2, my=(e.y1+e.y2)/2;
    p.setAttribute("d",`M${e.x1},${e.y1} Q${mx},${my} ${e.x2},${e.y2}`);
    p.setAttribute("class","edge"); p.setAttribute("stroke",e.hex); p.setAttribute("stroke-width",e.w);
    svg.appendChild(p);
  });

  nodes.forEach(n=>{
    const g=document.createElementNS(NS,"g");
    g.setAttribute("class","node"); g.setAttribute("transform",`translate(${n.x},${n.y})`);
    const fs = n.type==="center"?32 : n.type==="cat"?19 : n.type==="leaf"?15 : 12.5;
    const padX = n.type==="center"?26 : n.type==="sub"?10 : 14;
    const h = n.type==="center"?52 : n.type==="cat"?38 : n.type==="leaf"?30 : 24;
    const w = Math.max(n.label.length*fs*0.62 + padX*2, n.type==="center"?150:46);
    const rect=document.createElementNS(NS,"rect");
    rect.setAttribute("x",-w/2);rect.setAttribute("y",-h/2);
    rect.setAttribute("width",w);rect.setAttribute("height",h);rect.setAttribute("rx",h/2);
    if(n.type==="center"){rect.setAttribute("fill",n.hex);rect.setAttribute("filter","url(#glow)");}
    else if(n.type==="cat"){rect.setAttribute("fill",n.hex);}
    else if(n.type==="leaf"){rect.setAttribute("fill","#161d31");rect.setAttribute("stroke",n.hex);rect.setAttribute("stroke-width","2.2");}
    else {rect.setAttribute("fill",n.hex);rect.setAttribute("fill-opacity","0.16");rect.setAttribute("stroke",n.hex);rect.setAttribute("stroke-width","1.4");}
    const tx=document.createElementNS(NS,"text");
    tx.setAttribute("text-anchor","middle");tx.setAttribute("dy","0.35em");tx.setAttribute("font-size",fs);
    tx.setAttribute("fill", (n.type==="center"||n.type==="cat")?"#06121c" : n.hex);
    if(n.type==="cat")tx.setAttribute("fill","#06121c");
    tx.textContent=n.label;
    g.appendChild(rect);g.appendChild(tx);
    g.onclick=()=>showDetail(n);
    svg.appendChild(g);
  });
}
function shortLabel(t){return t.split(" (")[0].split(" /")[0];}
function catDesc(id){return{
  overview:"PLEOS의 정체성 — 브랜드 의미, 공개 무대(Pleos 25), 지향 패러다임(SDV).",
  os:"차량 제어 계층 — Vehicle OS와 이를 떠받치는 전자 구조(E&E·HPVC·존 컨트롤러·디커플링·66% 감축).",
  connect:"사용자가 만나는 인포테인먼트 — AAOS 기반 Pleos Connect와 화면·제스처·OTA.",
  ai:"지능형 인터페이스 — LLM 기반 에이전트 AI 'Gleo AI'.",
  eco:"개방형 생태계 — Playground·App Market·개발 환경 개방·클라우드/데이터.",
  biz:"사업·확산 — 최초 탑재 차종, 2030년 2,000만 대 목표."}[id];}
function showDetail(n){
  const d=n.data, color=n.hex;
  const catLabel = d.cat ? catName(d.cat) : (n.type==="cat"?"영역":"중심 브랜드");
  const chips=(d.subs&&d.subs.length)
    ? `<div class="pchips">${d.subs.map(s=>`<span class="subchip" style="background:${color}22;color:${color};border:1px solid ${color}66">${s}</span>`).join("")}</div>`:"";
  document.getElementById("panel").innerHTML=
    `<div class="cat" style="color:${color}">${catLabel}</div>
     <h3>${d.t}</h3><div class="en">${d.en||""}</div>
     <div class="d">${d.d}</div>${chips}`;
}
